name: AML Radar Daily

on:
  schedule:
      - cron: '0 6 * * *'   # 06:00 UTC = 07:00 CET / 08:00 CEST
        workflow_dispatch:        # manual run from GitHub UI

        jobs:
          scrape:
              runs-on: ubuntu-latest
                  permissions:
                        actions: write        # needed to upload/download artifacts
                              contents: read

                                  steps:
                                        - uses: actions/checkout@v4

                                              - uses: actions/setup-python@v5
                                                      with:
                                                                python-version: '3.11'
                                                                          cache: pip

                                                                                - name: Install dependencies
                                                                                        run: |
                                                                                                  pip install --upgrade pip
                                                                                                            pip install requests beautifulsoup4 lxml playwright openpyxl pypdf phonenumbers anthropic
                                                                                                                      playwright install chromium --with-deps
                                                                                                                      
                                                                                                                            - name: Restore DB from latest artifact
                                                                                                                                    uses: dawidd6/action-download-artifact@v6
                                                                                                                                            continue-on-error: true      # first run has no artifact yet
                                                                                                                                                    with:
                                                                                                                                                              name: amlradar-db
                                                                                                                                                                        path: .
                                                                                                                                                                                  workflow: amlradar.yml
                                                                                                                                                                                            if_no_artifact_found: warn
                                                                                                                                                                                            
                                                                                                                                                                                                  - name: Run AML Radar
                                                                                                                                                                                                          env:
                                                                                                                                                                                                                    GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
                                                                                                                                                                                                                              AML_EMAIL_FROM:     ${{ secrets.AML_EMAIL_FROM }}
                                                                                                                                                                                                                                        AML_EMAIL_TO:       ${{ secrets.AML_EMAIL_TO }}
                                                                                                                                                                                                                                                  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
                                                                                                                                                                                                                                                            GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                      GITHUB_REPOSITORY:  ${{ github.repository }}
                                                                                                                                                                                                                                                                              run: python main.py
                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                    - name: Persist DB
                                                                                                                                                                                                                                                                                            if: always()
                                                                                                                                                                                                                                                                                                    uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                      name: amlradar-db
                                                                                                                                                                                                                                                                                                                                path: amlradar.db
                                                                                                                                                                                                                                                                                                                                          retention-days: 90
                                                                                                                                                                                                                                                                                                                                                    overwrite: true
                                                                                                                                                                                                                                                                                                                                                    
